    <h1>Peanut Butter and Jelly!
        <p><img src="/home/dan/repos/odin-recipes/images/peanutbutterandjelly.png"></p>

    <p>
        <h3>Ingredients</h3>
        <ul>
            <li>Peanut Butter</li>
            <li>Jelly</li>
            <li>Two slices of bread</li>
        </ul>
    </p>
    <p>
        <h3>Directions</h3>
        <ol>
            <li>Take one slice of bread and spread peanut butter on one side</li>
            <li>Take the other slice of bread and spread jelly on one side</li>
            <li>Place the bread together</li>
        </ol>
    </p>
